<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎁 VILLD GIFT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
        :root{
            --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a24;
            --primary:#00d4ff;--accent:#f59e0b;--star:#fbbf24;--ton:#0088cc;
            --text:#ffffff;--text2:#8b95a5;--border:#2a2a3a;--green:#10b981;--red:#ef4444;
        }
        body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden;padding-bottom:80px;min-height:100vh;}
        
        /* ========== ЗАГРУЗОЧНЫЙ ЭКРАН ========== */
        .loading-screen{position:fixed;inset:0;background:#000;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s,visibility 0.6s;}
        .loading-screen.hide{opacity:0;visibility:hidden;pointer-events:none;}
        .letters-wrapper{display:flex;gap:4px;margin-bottom:40px;}
        .letter{font-family:'Inter',sans-serif;font-size:clamp(36px,10vw,64px);font-weight:900;animation:bounce 1.2s infinite ease-in-out;text-shadow:0 0 20px currentColor;}
        .letter:nth-child(1){color:#ff0000;animation-delay:0s;}
        .letter:nth-child(2){color:#ff8800;animation-delay:0.1s;}
        .letter:nth-child(3){color:#ffdd00;animation-delay:0.2s;}
        .letter:nth-child(4){color:#00cc44;animation-delay:0.3s;}
        .letter:nth-child(5){color:#00cccc;animation-delay:0.4s;}
        .letter:nth-child(6){color:transparent;animation:none;text-shadow:none;}
        .letter:nth-child(7){color:#0088ff;animation-delay:0.5s;}
        .letter:nth-child(8){color:#8844ff;animation-delay:0.6s;}
        .letter:nth-child(9){color:#ff44ff;animation-delay:0.7s;}
        .letter:nth-child(10){color:#00d4ff;animation-delay:0.8s;}
        @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}
        .loading-text{font-family:'Inter',sans-serif;font-size:14px;letter-spacing:10px;color:#8b95a5;font-weight:500;text-transform:uppercase;animation:pulse 1.5s infinite;}
        @keyframes pulse{0%,100%{opacity:0.5;}50%{opacity:1;}}
        .flash-transition{position:fixed;inset:0;background:#fff;z-index:99998;opacity:0;pointer-events:none;transition:opacity 0.2s;}
        .flash-transition.active{opacity:1;}
        
        /* ========== MAIN APP ========== */
        #mainApp{display:none;background:var(--bg);min-height:100vh;}
        #mainApp.show{display:block;animation:appear 0.4s;}
        @keyframes appear{from{opacity:0;transform:scale(0.95);}to{opacity:1;transform:scale(1);}}
        
        /* ========== ВЕРХНЯЯ ПЛАШКА ========== */
        .balance-header{padding:calc(env(safe-area-inset-top)+12px) 16px 8px;display:flex;align-items:center;justify-content:space-between;}
        .balance-card{background:linear-gradient(135deg,var(--surface),var(--surface2));border-radius:40px;padding:8px 16px 8px 12px;display:flex;align-items:center;gap:8px;border:1px solid var(--border);}
        .balance-icon{font-size:20px;}
        .balance-amount{font-weight:700;font-size:18px;color:var(--star);}
        .deposit-btn{background:var(--primary);border:none;color:#000;padding:6px 14px;border-radius:30px;font-weight:600;font-size:13px;cursor:pointer;margin-left:4px;}
        .ton-balance{background:var(--surface2);padding:8px 16px;border-radius:40px;border:1px solid var(--border);color:var(--ton);font-weight:600;font-size:13px;}
        
        /* ========== MAIN CONTENT ========== */
        .main-content{padding:8px 16px 20px;}
        
        /* ========== СЕКЦИИ ========== */
        .section-header{display:flex;justify-content:space-between;align-items:center;margin:20px 0 12px;}
        .section-header h3{font-size:18px;font-weight:700;}
        .cases-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
        
        /* КАРТОЧКА КЕЙСА */
        .case-card{background:var(--surface);border-radius:20px;padding:0;border:1px solid var(--border);cursor:pointer;transition:.2s;overflow:hidden;}
        .case-card:active{transform:scale(0.97);border-color:var(--primary);}
        .case-image{width:100%;aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;position:relative;}
        .case-image img{width:100%;height:100%;object-fit:cover;}
        .case-info{padding:16px;}
        .case-name{font-weight:700;font-size:16px;margin-bottom:4px;text-align:center;}
        .case-price{color:var(--star);font-weight:700;font-size:18px;text-align:center;}
        
        /* ========== ЭКРАН ОТКРЫТИЯ КЕЙСА ========== */
        .case-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;margin-bottom:20px;}
        .back-btn{background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;}
        .case-title{font-size:20px;font-weight:700;}
        
        .slot-container{background:var(--surface);border-radius:24px;padding:30px 20px;margin:20px 0;border:1px solid var(--border);}
        .slot-machine{display:flex;justify-content:center;gap:8px;height:120px;overflow:hidden;position:relative;}
        .slot-reel{flex:1;max-width:100px;position:relative;}
        .slot-reel-inner{position:absolute;top:0;left:0;right:0;transition:top 3s cubic-bezier(.2,.8,.4,1);}
        .slot-item{height:120px;display:flex;align-items:center;justify-content:center;font-size:56px;background:var(--surface2);border-radius:16px;margin-bottom:8px;border:1px solid var(--border);}
        
        .win-display{text-align:center;margin:20px 0;}
        .win-label{color:var(--text2);font-size:14px;margin-bottom:8px;}
        .win-item{font-size:64px;margin-bottom:8px;}
        .win-name{font-size:24px;font-weight:700;margin-bottom:4px;}
        .win-price{color:var(--star);font-size:28px;font-weight:700;}
        
        .case-contents{background:var(--surface);border-radius:24px;padding:20px;margin-top:20px;border:1px solid var(--border);}
        .contents-title{font-weight:700;margin-bottom:15px;}
        .contents-list{max-height:300px;overflow-y:auto;}
        .content-item{display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--surface2);border-radius:12px;margin-bottom:8px;}
        .content-left{display:flex;align-items:center;gap:12px;}
        .content-icon{font-size:32px;width:40px;text-align:center;}
        .content-name{font-weight:500;}
        .content-price{color:var(--star);font-weight:700;}
        .content-chance{color:var(--text2);font-size:12px;}
        
        .open-btn{width:100%;padding:18px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#000;font-weight:700;font-size:18px;cursor:pointer;margin-top:20px;}
        .open-btn:disabled{opacity:0.5;cursor:not-allowed;}
        
        /* ========== НИЖНЕЕ МЕНЮ ========== */
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,0.98);backdrop-filter:blur(25px);border-top:1px solid var(--border);display:flex;padding:10px 16px calc(env(safe-area-inset-bottom)+10px);justify-content:space-around;z-index:1000;}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text2);font-size:11px;cursor:pointer;border:none;background:none;transition:.2s;}
        .nav-item.active{color:var(--primary);}
        .nav-icon{font-size:24px;}
        
        .page{display:none;}
        .page.active{display:block;}
        
        /* ========== СКОРО... ========== */
        .soon-container{display:flex;align-items:center;justify-content:center;min-height:60vh;}
        .soon-letters{display:flex;gap:3px;}
        .soon-letter{font-family:'Inter',sans-serif;font-size:clamp(32px,8vw,56px);font-weight:900;animation:soonPulse 2s infinite;}
        .soon-letter:nth-child(1){color:#ff0000;animation-delay:0s;}
        .soon-letter:nth-child(2){color:#ff8800;animation-delay:0.1s;}
        .soon-letter:nth-child(3){color:#ffdd00;animation-delay:0.2s;}
        .soon-letter:nth-child(4){color:#00cc44;animation-delay:0.3s;}
        .soon-letter:nth-child(5){color:#00cccc;animation-delay:0.4s;}
        .soon-letter:nth-child(6){color:#0088ff;animation-delay:0.5s;}
        .soon-letter:nth-child(7){color:#8844ff;animation-delay:0.6s;}
        .soon-letter:nth-child(8){color:#ff44ff;animation-delay:0.7s;}
        @keyframes soonPulse{0%,100%{opacity:0.3;transform:scale(0.95);}50%{opacity:1;transform:scale(1.05);}}
        
        .toast{position:fixed;top:150px;left:50%;transform:translateX(-50%);background:var(--surface2);padding:12px 24px;border-radius:40px;z-index:9999;border:1px solid var(--border);}
        .toast.success{background:var(--green);}
    </style>
</head>
<body>

<!-- ЗАГРУЗОЧНЫЙ ЭКРАН -->
<div class="loading-screen" id="loadingScreen">
    <div class="letters-wrapper">
        <span class="letter">V</span><span class="letter">I</span><span class="letter">L</span><span class="letter">L</span><span class="letter">D</span>
        <span class="letter"> </span><span class="letter">G</span><span class="letter">I</span><span class="letter">F</span><span class="letter">T</span>
    </div>
    <div class="loading-text">LOADING</div>
</div>
<div class="flash-transition" id="flashTransition"></div>

<!-- MAIN APP -->
<div id="mainApp">
    <div class="balance-header">
        <div class="balance-card">
            <span class="balance-icon">⭐</span>
            <span class="balance-amount" id="starBal">2 500</span>
            <button class="deposit-btn" onclick="openDeposit()">+ Пополнить</button>
        </div>
        <div class="ton-balance" onclick="openDeposit()">
            <span>💎 0.05 TON</span>
        </div>
    </div>
    
    <div class="main-content">
        <!-- ГЛАВНАЯ -->
        <div class="page active" id="pageHome">
            <div class="section-header"><h3>🔥 Популярные кейсы</h3></div>
            <div class="cases-grid">
                <!-- DUROV'S CAP -->
                <div class="case-card" onclick="openCasePage('durov')">
                    <div class="case-image" style="background:#1a1a2e;">
                        <div style="font-size:64px;">🧢</div>
                    </div>
                    <div class="case-info">
                        <div class="case-name">DUROV'S CAP</div>
                        <div class="case-price">50 TON</div>
                    </div>
                </div>
                <!-- PLUSH PEPE -->
                <div class="case-card" onclick="openCasePage('pepe')">
                    <div class="case-image" style="background:#1a2a1a;">
                        <div style="font-size:64px;">🐸</div>
                    </div>
                    <div class="case-info">
                        <div class="case-name">PLUSH PEPE</div>
                        <div class="case-price">50 TON</div>
                    </div>
                </div>
                <!-- MIX CASE -->
                <div class="case-card" onclick="openCasePage('mix')">
                    <div class="case-image" style="background:linear-gradient(135deg,#1a1a2e,#2a1a2e);">
                        <div style="font-size:64px;">🎲</div>
                    </div>
                    <div class="case-info">
                        <div class="case-name">MIX CASE</div>
                        <div class="case-price">25 TON</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- КЕЙСЫ -->
        <div class="page" id="pageCases">
            <div class="section-header"><h3>🎁 Все кейсы</h3></div>
            <div class="cases-grid" id="allCasesGrid"></div>
        </div>
        
        <!-- ОТКРЫТИЕ КЕЙСА -->
        <div class="page" id="pageOpenCase">
            <div class="case-header">
                <button class="back-btn" onclick="closeCasePage()">←</button>
                <span class="case-title" id="openedCaseName">DUROV'S CAP</span>
                <div style="width:40px;"></div>
            </div>
            
            <div class="slot-container">
                <div class="slot-machine">
                    <div class="slot-reel"><div class="slot-reel-inner" id="reel1"></div></div>
                    <div class="slot-reel"><div class="slot-reel-inner" id="reel2"></div></div>
                    <div class="slot-reel"><div class="slot-reel-inner" id="reel3"></div></div>
                </div>
            </div>
            
            <div class="win-display" id="winDisplay" style="display:none;">
                <div class="win-label">ВЫ ВЫИГРАЛИ</div>
                <div class="win-item" id="winIcon">🧢</div>
                <div class="win-name" id="winName">DUROV'S CAP</div>
                <div class="win-price" id="winPrice">50 TON</div>
            </div>
            
            <button class="open-btn" id="openCaseBtn" onclick="startOpening()">🎁 ОТКРЫТЬ КЕЙС</button>
            
            <div class="case-contents">
                <div class="contents-title">📦 Содержимое кейса</div>
                <div class="contents-list" id="contentsList"></div>
            </div>
        </div>
        
        <!-- ОСТАЛЬНЫЕ РАЗДЕЛЫ -->
        <div class="page" id="pageGames"><div class="soon-container"><div class="soon-letters"><span class="soon-letter">С</span><span class="soon-letter">К</span><span class="soon-letter">О</span><span class="soon-letter">Р</span><span class="soon-letter">О</span><span class="soon-letter">.</span><span class="soon-letter">.</span><span class="soon-letter">.</span></div></div></div>
        <div class="page" id="pageProfile"><div class="soon-container"><div class="soon-letters"><span class="soon-letter">С</span><span class="soon-letter">К</span><span class="soon-letter">О</span><span class="soon-letter">Р</span><span class="soon-letter">О</span><span class="soon-letter">.</span><span class="soon-letter">.</span><span class="soon-letter">.</span></div></div></div>
        <div class="page" id="pageRef"><div class="soon-container"><div class="soon-letters"><span class="soon-letter">С</span><span class="soon-letter">К</span><span class="soon-letter">О</span><span class="soon-letter">Р</span><span class="soon-letter">О</span><span class="soon-letter">.</span><span class="soon-letter">.</span><span class="soon-letter">.</span></div></div></div>
    </div>
    
    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchPage('home')"><span class="nav-icon">🏠</span><span>Главная</span></button>
        <button class="nav-item" onclick="switchPage('cases')"><span class="nav-icon">🎁</span><span>Кейсы</span></button>
        <button class="nav-item" onclick="switchPage('games')"><span class="nav-icon">🎮</span><span>Игры</span></button>
        <button class="nav-item" onclick="switchPage('profile')"><span class="nav-icon">👤</span><span>Профиль</span></button>
        <button class="nav-item" onclick="switchPage('ref')"><span class="nav-icon">👥</span><span>Друзья</span></button>
    </div>
</div>

<div id="toast" class="toast" style="display:none;"></div>

<script>
    const tg = window.Telegram?.WebApp;
    if(tg){tg.ready();tg.expand();tg.enableClosingConfirmation();}
    
    let starBalance = 2500;
    let tonBalance = 0.05;
    let currentCase = null;
    let isOpening = false;
    
    // Содержимое кейсов
    const CASE_DATA = {
        durov: {name:'DUROV\'S CAP', price:50, currency:'TON', items:[
            {icon:'🧢', name:'DUROV\'S CAP', price:50, chance:15},
            {icon:'💎', name:'TON ALMAZ', price:25, chance:30},
            {icon:'⭐', name:'STAR', price:10, chance:35},
            {icon:'🪙', name:'COIN', price:5, chance:20}
        ]},
        pepe: {name:'PLUSH PEPE', price:50, currency:'TON', items:[
            {icon:'🐸', name:'PLUSH PEPE', price:50, chance:15},
            {icon:'💎', name:'TON ALMAZ', price:25, chance:30},
            {icon:'⭐', name:'STAR', price:10, chance:35},
            {icon:'🪙', name:'COIN', price:5, chance:20}
        ]},
        mix: {name:'MIX CASE', price:25, currency:'TON', items:[
            {icon:'🧢', name:'DUROV\'S CAP', price:50, chance:5},
            {icon:'🐸', name:'PLUSH PEPE', price:50, chance:5},
            {icon:'💎', name:'TON ALMAZ', price:25, chance:25},
            {icon:'⭐', name:'STAR', price:10, chance:35},
            {icon:'🪙', name:'COIN', price:5, chance:30}
        ]}
    };
    
    function updateUI() {
        document.getElementById('starBal').textContent = starBalance.toLocaleString();
    }
    
    function toast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = 'toast' + (type ? ' ' + type : '');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }
    
    setTimeout(() => {
        document.getElementById('flashTransition').classList.add('active');
        setTimeout(() => {
            document.getElementById('loadingScreen').classList.add('hide');
            document.getElementById('mainApp').classList.add('show');
            setTimeout(() => document.getElementById('flashTransition').classList.remove('active'), 200);
            updateUI();
            renderAllCases();
        }, 250);
    }, 2500);
    
    function switchPage(page) {
        if (isOpening) return;
        document.querySelectorAll('.nav-item').forEach((n, i) => {
            const pages = ['home', 'cases', 'games', 'profile', 'ref'];
            n.classList.toggle('active', pages[i] === page);
        });
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1)).classList.add('active');
    }
    
    function renderAllCases() {
        const grid = document.getElementById('allCasesGrid');
        if (!grid) return;
        let html = '';
        for (let key in CASE_DATA) {
            const c = CASE_DATA[key];
            let bg = key === 'mix' ? 'linear-gradient(135deg,#1a1a2e,#2a1a2e)' : (key === 'durov' ? '#1a1a2e' : '#1a2a1a');
            html += `<div class="case-card" onclick="openCasePage('${key}')">
                <div class="case-image" style="background:${bg};"><div style="font-size:64px;">${c.items[0].icon}</div></div>
                <div class="case-info"><div class="case-name">${c.name}</div><div class="case-price">${c.price} ${c.currency}</div></div>
            </div>`;
        }
        grid.innerHTML = html;
    }
    
    function openCasePage(caseId) {
        currentCase = caseId;
        const c = CASE_DATA[caseId];
        document.getElementById('openedCaseName').textContent = c.name;
        
        let html = '';
        c.items.forEach(item => {
            html += `<div class="content-item"><div class="content-left"><span class="content-icon">${item.icon}</span><span class="content-name">${item.name}</span></div><div><span class="content-price">${item.price} ${c.currency}</span><div class="content-chance">${item.chance}%</div></div></div>`;
        });
        document.getElementById('contentsList').innerHTML = html;
        
        document.getElementById('winDisplay').style.display = 'none';
        document.getElementById('openCaseBtn').style.display = 'block';
        document.getElementById('openCaseBtn').disabled = false;
        
        fillReels();
        switchPage('openCase');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    }
    
    function fillReels() {
        const c = CASE_DATA[currentCase];
        const items = c.items;
        let reel1 = '', reel2 = '', reel3 = '';
        for (let i = 0; i < 20; i++) {
            reel1 += `<div class="slot-item">${items[Math.floor(Math.random() * items.length)].icon}</div>`;
            reel2 += `<div class="slot-item">${items[Math.floor(Math.random() * items.length)].icon}</div>`;
            reel3 += `<div class="slot-item">${items[Math.floor(Math.random() * items.length)].icon}</div>`;
        }
        document.getElementById('reel1').innerHTML = reel1;
        document.getElementById('reel2').innerHTML = reel2;
        document.getElementById('reel3').innerHTML = reel3;
    }
    
    function closeCasePage() {
        if (isOpening) return;
        switchPage('cases');
        renderAllCases();
    }
    
    function startOpening() {
        if (isOpening) return;
        const c = CASE_DATA[currentCase];
        const price = c.price;
        const currency = c.currency;
        
        if (currency === 'TON' && tonBalance < price) { toast('Недостаточно TON', 'error'); return; }
        
        tonBalance -= price;
        updateUI();
        
        isOpening = true;
        document.getElementById('openCaseBtn').disabled = true;
        
        const items = c.items;
        const totalChance = items.reduce((sum, i) => sum + i.chance, 0);
        let rand = Math.random() * totalChance;
        let winItem = items[0];
        for (let item of items) {
            rand -= item.chance;
            if (rand <= 0) { winItem = item; break; }
        }
        
        tonBalance += winItem.price;
        updateUI();
        
        const reel1 = document.getElementById('reel1');
        const reel2 = document.getElementById('reel2');
        const reel3 = document.getElementById('reel3');
        
        reel1.style.transition = 'top 3s cubic-bezier(.2,.8,.4,1)';
        reel2.style.transition = 'top 3s cubic-bezier(.2,.8,.4,1)';
        reel3.style.transition = 'top 3s cubic-bezier(.2,.8,.4,1)';
        
        reel1.style.top = '-1800px';
        reel2.style.top = '-1920px';
        reel3.style.top = '-2040px';
        
        setTimeout(() => {
            document.getElementById('winIcon').textContent = winItem.icon;
            document.getElementById('winName').textContent = winItem.name;
            document.getElementById('winPrice').textContent = winItem.price + ' ' + currency;
            document.getElementById('winDisplay').style.display = 'block';
            document.getElementById('openCaseBtn').style.display = 'none';
            
            reel1.style.transition = 'none';
            reel2.style.transition = 'none';
            reel3.style.transition = 'none';
            reel1.style.top = '0';
            reel2.style.top = '0';
            reel3.style.top = '0';
            
            fillReels();
            isOpening = false;
            toast('🎉 Вы выиграли ' + winItem.name + '!', 'success');
        }, 3000);
    }
    
    function openDeposit() { toast('💎 Пополнение — скоро!'); }
</script>
</body>
                      </html>
