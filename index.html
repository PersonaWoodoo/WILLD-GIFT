<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎁 VILLD GIFT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
        :root{--bg:#0a0a14;--surface:#12121e;--surface2:#1a1a2e;--primary:#ff2d8d;--secondary:#00d4ff;--accent:#ffd700;--text:#fff;--text2:#8b9bbf;--border:#2a2a4a;--green:#10b981;--red:#ef4444}
        body{font-family:'Inter',sans-serif;background:#0a0a14;color:#fff;min-height:100vh;overflow-x:hidden;position:relative}
        .stars-background{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(circle at 30% 10%,#1a1a3e 0%,#0a0a14 80%)}
        .star-particle{position:absolute;color:#ffd700;animation:starFall linear infinite;text-shadow:0 0 8px #ffd700,0 0 15px #ffd700;z-index:0}
        @keyframes starFall{0%{transform:translateY(-20px) rotate(0deg) scale(0.5);opacity:0}10%{opacity:1;transform:translateY(20px) rotate(45deg) scale(1)}90%{opacity:0.8;transform:translateY(90vh) rotate(180deg) scale(0.3)}100%{transform:translateY(100vh) rotate(360deg) scale(0);opacity:0}}
        .loading-screen{position:fixed;inset:0;background:#0a0a14;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s}
        .loading-screen.hide{opacity:0;pointer-events:none}
        .letters-wrapper{display:flex;gap:4px;margin-bottom:40px}
        .letter{font-size:clamp(36px,10vw,64px);font-weight:900;animation:letterBounce 1.2s infinite;text-shadow:0 0 20px currentColor}
        .letter:nth-child(1){color:#f00;animation-delay:0s}.letter:nth-child(2){color:#f80;animation-delay:0.1s}.letter:nth-child(3){color:#fd0;animation-delay:0.2s}.letter:nth-child(4){color:#0c4;animation-del<script>
const tg=window.Telegram.WebApp;tg.expand();
const ADMIN_ID='8478884644';const SLOT_W=130;const BOT_USERNAME='debashev';const CLOUD_KEY='villd_gift_cloud_v5';
let user=tg.initDataUnsafe?.user;let userId=user?.id?.toString()||'';let isAdmin=userId===ADMIN_ID;
let starBalance=10000,tonBalance=0,inventory=[],history=[],cases=[],giftDeposits=[],refCount=0,refEarn=0;
let selectedCaseCurrency='star',selectedDropCurrency='star';
let isSpinning=!1,currentWin=null,currentCase=null,editCaseId=null,editDropIdx=null;
let currentFilter='all';let liveTickerData=[];

function loadData(){
    starBalance=parseInt(localStorage.getItem('vg_star')||'10000');
    tonBalance=parseFloat(localStorage.getItem('vg_ton')||'0');
    inventory=JSON.parse(localStorage.getItem('vg_inv')||'[]');
    history=JSON.parse(localStorage.getItem('vg_hist')||'[]');
    cases=JSON.parse(localStorage.getItem('vg_cases')||'[]');
    giftDeposits=JSON.parse(localStorage.getItem('vg_gifts')||'[]');
    refCount=parseInt(localStorage.getItem('vg_refc')||'0');
    refEarn=parseInt(localStorage.getItem('vg_refe')||'0');
    liveTickerData=JSON.parse(localStorage.getItem('vg_live')||'[]');
}
loadData();

function saveData(){
    localStorage.setItem('vg_star',starBalance);localStorage.setItem('vg_ton',tonBalance);
    localStorage.setItem('vg_inv',JSON.stringify(inventory));localStorage.setItem('vg_hist',JSON.stringify(history));
    localStorage.setItem('vg_cases',JSON.stringify(cases));localStorage.setItem('vg_gifts',JSON.stringify(giftDeposits));
    localStorage.setItem('vg_refc',refCount);localStorage.setItem('vg_refe',refEarn);
    localStorage.setItem('vg_live',JSON.stringify(liveTickerData));
}

function createStars(){const c=document.getElementById('starsContainer');const t=['⭐','🌟','✨','💫'];for(let i=0;i<50;i++){let s=document.createElement('div');s.className='star-particle';s.textContent=t[Math.floor(Math.random()*t.length)];s.style.left=Math.random()*100+'vw';s.style.fontSize=(Math.random()*16+10)+'px';s.style.animationDuration=(Math.random()*15+10)+'s';s.style.animationDelay=(Math.random()*10)+'s';c.appendChild(s)}}
function sortCases(){cases.sort((a,b)=>a.price-b.price)}
function updBal(){document.getElementById('starBalance').textContent=starBalance;document.getElementById('tonBalance').textContent=tonBalance.toFixed(2);saveData()}
function depositStar(v){starBalance+=v;updBal();toast('+'+v+' ⭐')}
function depositTon(v){tonBalance+=v;updBal();toast('+'+v+' TON')}
function showDep(){document.getElementById('depModal').classList.add('on')}
function switchDepTab(t){document.querySelectorAll('#depModal .menu-tab').forEach(x=>x.classList.remove('active'));document.querySelector(`[data-dep="${t}"]`).classList.add('active');document.getElementById('depStar').style.display=t==='star'?'grid':'none';document.getElementById('depTon').style.display=t==='ton'?'grid':'none'}
function selectCaseCurrency(t){selectedCaseCurrency=t;document.querySelectorAll('#caseCurrency .currency-btn').forEach(b=>b.classList.remove('active'));document.querySelector('#caseCurrency .currency-btn.'+t).classList.add('active')}
function selectDropCurrency(t){selectedDropCurrency=t;document.querySelectorAll('#dropCurrency .currency-btn').forEach(b=>b.classList.remove('active'));document.querySelector('#dropCurrency .currency-btn.'+t).classList.add('active')}
function updRef(){document.getElementById('refCount').textContent=refCount;document.getElementById('refEarn').textContent=refEarn+' ⭐'}

// ===== LIVE TICKER =====
function addLiveWin(name,img,price,currency){
    let fnames=['Игрок','Player','User','Gamer','Lucky'];
    let rname=fnames[Math.floor(Math.random()*fnames.length)]+Math.floor(Math.random()*999);
    liveTickerData.unshift({name:rname,item:name,img:img,price:price,currency:currency||'star',time:Date.now()});
    if(liveTickerData.length>30)liveTickerData.pop();
    saveData();renderLiveTicker();
}
function renderLiveTicker(){
    let t=document.getElementById('liveTrack');
    if(liveTickerData.length===0){t.innerHTML='<span class="live-item">🎉 Ждём выигрыши...</span>';return}
    let h=liveTickerData.map(l=>{
        let ih=l.img&&l.img.startsWith('http')?`<img src="${l.img}">`:l.img||'🎁';
        let pl=l.currency==='ton'?l.price+' TON':l.price+' ⭐';
        return`<span class="live-item"><span class="live-avatar">${ih}</span> ${l.name} выиграл ${l.item} (${pl})</span>`;
    }).join('');
    t.innerHTML=h+h;
}

// ===== ОБЛАКО =====
async function saveToCloud(d){try{if(tg.CloudStorage){await tg.CloudStorage.setItem(CLOUD_KEY,JSON.stringify(d));return true}}catch(e){}return false}
async function loadFromCloud(){try{if(tg.CloudStorage){let r=await tg.CloudStorage.getItem(CLOUD_KEY);if(r)return JSON.parse(r)}}catch(e){}return null}
async function publishToCloud(){if(!isAdmin)return;document.getElementById('publishModal').classList.add('on')}
async function confirmPublish(){closeModal('publishModal');let s=await saveToCloud({cases,liveTickerData,updatedAt:Date.now()});if(s)toast('☁️ Опубликовано!');else{localStorage.setItem('vg_cases',JSON.stringify(cases));toast('⚠️ Сохранено локально')}}
async function syncFromCloud(){let d=await loadFromCloud();if(d){if(d.cases){cases=d.cases;localStorage.setItem('vg_cases',JSON.stringify(cases))}if(d.liveTickerData){liveTickerData=d.liveTickerData;localStorage.setItem('vg_live',JSON.stringify(liveTickerData))}renderCases();renderLiveTicker();return true}return false}
async function forceSyncNow(){await syncFromCloud();updBal();updInv();updHist();updGiftDeposits();renderLiveTicker();updRef()}

// ===== ФИЛЬТРЫ =====
function getFilteredCases(){
    let f=[...cases];
    if(currentFilter==='limited')f=f.filter(c=>c.maxOpens>0);
    if(currentFilter==='expensive')f=f.filter(c=>{let max=Math.max(...cases.map(x=>x.price||0));return c.price>=max*0.7});
    if(currentFilter==='cheap')f=f.filter(c=>{let min=Math.min(...cases.map(x=>x.price||999));return c.price<=min*1.5});
    if(currentFilter==='free')f=f.filter(c=>c.price===0);
    if(currentFilter==='ton')f=f.filter(c=>c.currency==='ton');
    if(currentFilter==='star')f=f.filter(c=>c.currency==='star');
    return f;
}

function canOpenFree(cid){
    let last=localStorage.getItem('vg_free_'+cid);
    if(!last)return true;
    return Date.now()-parseInt(last)>86400000; // 24 часа
}
function markFreeOpened(cid){localStorage.setItem('vg_free_'+cid,Date.now().toString())}

function renderCases(){
    const g=document.getElementById('casesGrid');
    let f=getFilteredCases();
    if(f.length===0){g.innerHTML='<div style="color:#8b9bbf;text-align:center;padding:40px;grid-column:1/-1">Нет кейсов</div>';return}
    g.innerHTML='';f.forEach(c=>{
        let d=document.createElement('div');let cls='case-card';
        if(isAdmin)cls+=' admin';if(c.maxOpens>0)cls+=' limited';if(c.price===0)cls+=' free';
        if(c.price===0&&!canOpenFree(c.id))cls+=' cooldown';
        d.className=cls;d.style.position='relative';
        let ih=c.image&&c.image.startsWith('http')?`<img src="${c.image}" alt="">`:c.image||'❓';
        let ph=c.currency==='ton'?`💎 ${c.price} TON`:`⭐ ${c.price}`;
        let pc=c.currency==='ton'?'ton':'star';
        let badge='';
        if(c.maxOpens>0&&(c.openCount||0)<c.maxOpens)badge='<div class="case-badge limited">ЛИМИТ</div>';
        if(c.maxOpens>0&&(c.openCount||0)>=c.maxOpens)badge='<div class="case-badge hot">ЗАКРЫТ</div>';
        if(c.price===0)badge='<div class="case-badge free">БЕСПЛАТНО</div>';
        if(c.price===0&&!canOpenFree(c.id))badge='<div class="case-badge hot">ЖДИ</div>';
        d.innerHTML=`${badge}<div class="case-img">${ih}</div><div class="case-name">${c.name}</div><div class="case-price ${pc}">${ph}</div>${isAdmin?`<button class="case-edit" onclick="event.stopPropagation();editCase('${c.id}')"><i class="fas fa-pen"></i></button><button class="case-delete" onclick="event.stopPropagation();deleteCase('${c.id}')"><i class="fas fa-trash"></i></button>`:''}`;
        d.onclick=()=>{
            if(c.maxOpens>0&&(c.openCount||0)>=c.maxOpens){toast('🚫 Лимит исчерпан!');return}
            if(c.price===0&&!canOpenFree(c.id)){toast('⏰ Бесплатный кейс раз в 24 часа!');return}
            openCase(c.id);
        };
        g.appendChild(d);
    });
}

document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));this.classList.add('active');currentFilter=this.dataset.filter;renderCases()}));

function showPage(p){
    if(p==='soon'){toast('Скоро...');return}
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
    let el=document.getElementById(p+'-page');if(el)el.classList.add('active');
    document.querySelectorAll('.nav-button').forEach(b=>b.classList.remove('active'));
    let nb=document.querySelector(`[data-page="${p}"]`);if(nb)nb.classList.add('active');
    if(p==='profile'){updInv();updHist();updGiftDeposits()}if(p==='friends')updRef();
}

function openCase(id){
    let cs=cases.find(c=>c.id===id);if(!cs)return;
    if(cs.maxOpens>0&&(cs.openCount||0)>=cs.maxOpens){toast('🚫 Лимит исчерпан!');return}
    if(cs.price===0&&!canOpenFree(cs.id)){toast('⏰ Бесплатный кейс раз в 24 часа!');return}
    currentCase=cs;
    document.getElementById('caseTitle').textContent=cs.name;
    updateSpinBtn();
    document.getElementById('winDisplay').style.display='none';
    document.getElementById('multiResults').style.display='none';
    document.getElementById('spinBtn').disabled=!1;
    currentWin=null;
    buildRoulette(cs.drops);
    buildContentsGrid(cs);
    showPage('case');
    document.getElementById('addDropBtn').style.display=isAdmin?'block':'none';
    document.getElementById('deleteCaseBtn').style.display=isAdmin?'block':'none';
    // Для бесплатного - только 1x
    if(cs.price===0){
        document.getElementById('multiSelectDiv').style.display='none';
        document.getElementById('spinCount').value='1';
    }else{
        document.getElementById('multiSelectDiv').style.display='flex';
    }
}
function goBack(){showPage('home')}
function updateSpinBtn(){
    if(!currentCase)return;
    let cnt=parseInt(document.getElementById('spinCount').value)||1;
    if(currentCase.price===0)cnt=1;
    let cl=currentCase.currency==='ton'?'TON':'⭐';
    let total=currentCase.price*cnt;
    document.getElementById('spinBtn').textContent='🎰 КРУТИТЬ ('+cnt+'x = '+total+' '+cl+')';
    document.getElementById('spinBtn').dataset.count=cnt;
    document.getElementById('spinBtn').dataset.price=currentCase.price;
    document.getElementById('spinBtn').dataset.currency=currentCase.currency;
}

function buildRoulette(drops){
    let t=document.getElementById('rouletteTrack');t.innerHTML='';if(drops.length===0)return;
    let ext=[];for(let k=0;k<20;k++)ext.push(...drops);
    ext.forEach(g=>{let s=document.createElement('div');s.className='roulette-slot';let ih=g.img&&g.img.startsWith('http')?`<img src="${g.img}" alt="">`:g.img||'❓';s.innerHTML=`<div class="roulette-slot-image">${ih}</div><div class="roulette-slot-name">${g.name}</div>`;t.appendChild(s)});
    t.style.transform='translateX(0px)';t.dataset.pos=0;t.dataset.dropCount=drops.length;
}
function buildContentsGrid(cs){
    let g=document.getElementById('contentsGrid');
    if(cs.drops.length===0){g.innerHTML='<div style="color:#8b9bbf;text-align:center;padding:20px;grid-column:1/-1">Нет дропов</div>';return}
    g.innerHTML=cs.drops.map((d,i)=>{let ih=d.img&&d.img.startsWith('http')?`<img src="${d.img}" alt="">`:d.img||'❓';let ph=d.currency==='ton'?`💎 ${d.price} TON`:`⭐ ${d.price}`;let pc=d.currency==='ton'?'ton':'star';return`<div class="content-item${isAdmin?' admin':''}"><div class="content-item-img">${ih}</div><div class="content-item-name">${d.name}</div><div class="content-item-price ${pc}">${ph}</div>${isAdmin?`<div class="content-item-actions"><button class="case-edit" style="position:static;display:flex" onclick="editDrop('${cs.id}',${i})"><i class="fas fa-pen"></i></button><button class="case-edit" style="position:static;display:flex;color:#ef4444" onclick="delDrop('${cs.id}',${i})"><i class="fas fa-times"></i></button></div>`:''}</div>`}).join('')}

function spinRoulette(){
    if(isSpinning||!currentCase)return;
    let cnt=parseInt(document.getElementById('spinCount').value)||1;
    if(currentCase.price===0)cnt=1;
    let pr=parseFloat(document.getElementById('spinBtn').dataset.price)||500;
    let curr=document.getElementById('spinBtn').dataset.currency||'star';
    let total=pr*cnt;
    if(curr==='star'&&starBalance<total){toast('Недостаточно звёзд!');return}
    if(curr==='ton'&&tonBalance<total){toast('Недостаточно TON!');return}
    if(currentCase.maxOpens>0&&(currentCase.openCount||0)+cnt>currentCase.maxOpens){toast('🚫 Превышен лимит!');return}
    if(curr==='star')starBalance-=total;else tonBalance-=total;
    if(currentCase.maxOpens>0)currentCase.openCount=(currentCase.openCount||0)+cnt;
    if(currentCase.price===0)markFreeOpened(currentCase.id);
    updBal();isSpinning=!0;document.getElementById('spinBtn').disabled=!0;
    document.getElementById('winDisplay').style.display='none';document.getElementById('multiResults').style.display='none';
    let drops=currentCase.drops;
    let allWins=[];
    for(let s=0;s<cnt;s++){let tc=drops.reduce((sum,g)=>sum+(parseFloat(g.chance)||0),0),r=Math.random()*tc,win=drops[0];for(let g of drops){r-=(parseFloat(g.chance)||0);if(r<=0){win=g;break}}allWins.push(win)}
    let win=allWins[0],wi=drops.indexOf(win),tr=document.getElementById('rouletteTrack');
    let dc=parseInt(tr.dataset.dropCount)||drops.length,ts=10*dc+wi,to=-(ts*SLOT_W);
    let extra=Math.floor(Math.random()*2+1)*dc*SLOT_W,td=to-extra;
    let dur=4000+Math.random()*2000,st=Date.now();
    function anim(){
        let e=Date.now()-st,p=Math.min(e/dur,1),ea=1-Math.pow(1-p,3);
        tr.style.transform=`translateX(${td*ea}px)`;tr.dataset.pos=td*ea;
        if(p<1)requestAnimationFrame(anim);
        else{
            currentWin=win;
            let ic=document.getElementById('winIcon');ic.innerHTML=win.img&&win.img.startsWith('http')?`<img src="${win.img}" alt="">`:win.img||'❓';
            document.getElementById('winName').textContent=cnt>1?`${win.name} + ещё ${cnt-1}`:win.name;
            let wc=win.currency||curr;
            document.getElementById('winPrice').textContent=wc==='ton'?win.price+' TON':win.price+' ⭐';
            document.getElementById('winPrice').className='win-price '+(wc==='ton'?'ton':'star');
            document.getElementById('winDisplay').style.display='block';
            if(cnt>1){let mr=document.getElementById('multiResults');mr.style.display='block';mr.innerHTML='<div style="font-weight:700;margin-bottom:8px">🎒 Все дропы ('+cnt+' шт):</div><div class="contents-grid">'+allWins.map(w=>{let ih=w.img&&w.img.startsWith('http')?`<img src="${w.img}" alt="">`:w.img||'❓';let ph=wc==='ton'?w.price+' TON':w.price+' ⭐';return`<div class="content-item"><div class="content-item-img">${ih}</div><div class="content-item-name">${w.name}</div><div class="content-item-price ${wc==='ton'?'ton':'star'}">${ph}</div></div>`}).join('')+'</div>';allWins.forEach(w=>inventory.push({name:w.name,price:w.price,currency:w.currency||curr,img:w.img}))}else{inventory.push({name:win.name,price:win.price,currency:wc,img:win.img})}
            saveData();updInv();
            isSpinning=!1;
            history.unshift({name:win.name,price:win.price,currency:wc,img:win.img,time:new Date().toLocaleTimeString()});
            if(history.length>50)history.pop();
            addLiveWin(win.name,win.img,win.price,wc);
            saveData();updHist();renderLiveTicker();renderCases();
        }
    }
    requestAnimationFrame(anim);
}

function toInv(){if(!currentWin)return;inventory.push({name:currentWin.name,price:currentWin.price,currency:currentWin.currency||currentCase.currency,img:currentWin.img});saveData();updInv();toast('📦 В инвентарь!');closeWin()}
function sellWin(){if(!currentWin)return;let curr=currentWin.currency||currentCase.currency;if(curr==='star')starBalance+=Math.floor(currentWin.price*0.5);else tonBalance+=Math.round(currentWin.price*0.5*100)/100;updBal();toast('💰 Продано!');closeWin()}
function closeWin(){document.getElementById('winDisplay').style.display='none';document.getElementById('multiResults').style.display='none';document.getElementById('spinBtn').disabled=!1;currentWin=null;if(currentCase)buildRoulette(currentCase.drops)}

function withdrawItem(idx){if(!inventory[idx])return;let item=inventory[idx];if(item.currency==='ton')tonBalance+=item.price;else starBalance+=item.price;inventory.splice(idx,1);updBal();updInv();saveData();toast('💱 Выведено!')}
function sellInvItem(idx){if(!inventory[idx])return;let item=inventory[idx];if(item.currency==='ton')tonBalance+=Math.round(item.price*0.4*100)/100;else starBalance+=Math.floor(item.price*0.4);inventory.splice(idx,1);updBal();updInv();saveData();toast('💰 Продано!')}

function updInv(){let c=document.getElementById('inventoryList');if(!inventory||inventory.length===0){c.innerHTML='<span style="color:#8b9bbf">Пока пусто...</span>';return}c.innerHTML=inventory.map((g,i)=>{let ih=g.img&&g.img.startsWith('http')?`<img src="${g.img}">`:g.img||'❓';let pc=g.currency==='ton'?'ton':'star';let pl=g.currency==='ton'?g.price+' TON':g.price+' ⭐';return`<div class="list-row"><div class="list-row-left"><div class="list-thumb">${ih}</div><span class="list-name">${g.name}</span></div><div class="list-actions"><span class="list-price ${pc}">${pl}</span><button class="list-btn gold" onclick="withdrawItem(${i})">💱 Вывести</button><button class="list-btn green" onclick="sellInvItem(${i})">💰 Продать</button></div></div>`}).join('')}
function updHist(){let c=document.getElementById('historyList');if(!history||history.length===0){c.innerHTML='<span style="color:#8b9bbf">Пока пусто...</span>';return}c.innerHTML=history.map(g=>{let ih=g.img&&g.img.startsWith('http')?`<img src="${g.img}">`:g.img||'❓';let pc=g.currency==='ton'?'ton':'star';let pl=g.currency==='ton'?g.price+' TON':g.price+' ⭐';return`<div class="list-row"><div class="list-row-left"><div class="list-thumb">${ih}</div><span class="list-name">${g.name}</span></div><div><span style="font-size:11px;color:#8b9bbf">${g.time}</span> <span class="list-price ${pc}">${pl}</span></div></div>`}).join('')}

function sendGiftToBot(){let u='https://t.me/'+BOT_USERNAME;if(tg.openTelegramLink)tg.openTelegramLink(u);else window.open(u,'_blank');toast('📤 Переходим в @'+BOT_USERNAME)}
function addGiftDeposit(n,p,i,c){giftDeposits.unshift({name:n,price:p,img:i,currency:c||'star',time:new Date().toLocaleTimeString()});if(c==='ton')tonBalance+=p;else starBalance+=p;updBal();updGiftDeposits();saveData();toast('🎁 +'+(c==='ton'?p+' TON':p+' ⭐'))}
function updGiftDeposits(){let c=document.getElementById('giftDepositList');if(giftDeposits.length===0){c.innerHTML='<span style="color:#8b9bbf;font-size:13px">Пока нет полученных подарков</span>';return}c.innerHTML=giftDeposits.map(g=>{let ih=g.img&&g.img.startsWith('http')?`<img src="${g.img}">`:g.img||'🎁';let pc=g.currency==='ton'?'ton':'star';let pl=g.currency==='ton'?g.price+' TON':g.price+' ⭐';return`<div class="list-row"><div class="list-row-left"><div class="list-thumb">${ih}</div><span class="list-name">${g.name}</span></div><div><span style="font-size:11px;color:#8b9bbf">${g.time}</span> <span class="list-price ${pc}">${pl}</span></div></div>`}).join('')}

function copyRef(){let l=document.getElementById('refLink').textContent;navigator.clipboard.writeText(l).then(()=>toast('📋 Скопировано!')).catch(()=>toast('Не удалось'))}
function shareRef(){let l=document.getElementById('refLink').textContent;let t='🎁 Залетай в VILLD GIFT!';let u='https://t.me/share/url?url='+encodeURIComponent(l)+'&text='+encodeURIComponent(t);if(tg.openTelegramLink)tg.openTelegramLink(u);else window.open(u,'_blank')}

function showCaseModal(id=null){editCaseId=id;document.getElementById('caseModalTitle').textContent=id?'Редактировать кейс':'Добавить кейс';if(id){let cs=cases.find(c=>c.id===id);document.getElementById('caseNameInp').value=cs.name||'';document.getElementById('casePriceInp').value=cs.price||'';document.getElementById('caseImgInp').value=cs.image||'';document.getElementById('caseLimitInp').value=cs.maxOpens||0;selectCaseCurrency(cs.currency||'star')}else{document.getElementById('caseNameInp').value='';document.getElementById('casePriceInp').value='';document.getElementById('caseImgInp').value='';document.getElementById('caseLimitInp').value='0';selectCaseCurrency('star')}document.getElementById('caseModal').classList.add('on')}
function editCase(id){showCaseModal(id)}
function saveCase(){let n=document.getElementById('caseNameInp').value.trim();let p=parseFloat(document.getElementById('casePriceInp').value);let i=document.getElementById('caseImgInp').value.trim();let limit=parseInt(document.getElementById('caseLimitInp').value)||0;if(!n||isNaN(p)||p<0)return toast('Заполните все поля!');if(editCaseId){let cs=cases.find(c=>c.id===editCaseId);if(cs){cs.name=n;cs.price=p;cs.image=i;cs.currency=selectedCaseCurrency;cs.maxOpens=limit;cs.openCount=cs.openCount||0}}else{cases.push({id:'c_'+Date.now(),name:n,price:p,image:i,currency:selectedCaseCurrency,drops:[],maxOpens:limit,openCount:0})}closeModal('caseModal');renderCases();saveData();toast('✅ Кейс сохранён!')}
function deleteCase(id){if(!isAdmin||!confirm('Удалить кейс?'))return;cases=cases.filter(c=>c.id!==id);saveData();renderCases();if(currentCase&&currentCase.id===id){currentCase=null;goBack()}toast('🗑 Кейс удалён')}
function deleteCurrentCase(){if(currentCase)deleteCase(currentCase.id)}

function showDropModal(idx=null){if(!currentCase)return;editDropIdx=idx;document.getElementById('dropModalTitle').textContent=idx!==null?'Редактировать дроп':'Добавить дроп';if(idx!==null){let d=currentCase.drops[idx];document.getElementById('dropNameInp').value=d.name||'';document.getElementById('dropPriceInp').value=d.price||'';document.getElementById('dropImgInp').value=d.img||'';document.getElementById('dropChanceInp').value=d.chance||'';selectDropCurrency(d.currency||currentCase.currency)}else{document.getElementById('dropNameInp').value='';document.getElementById('dropPriceInp').value='';document.getElementById('dropImgInp').value='';document.getElementById('dropChanceInp').value='';selectDropCurrency(currentCase.currency||'star')}document.getElementById('dropModal').classList.add('on')}
function editDrop(cid,idx){let cs=cases.find(c=>c.id===cid);if(cs){currentCase=cs;showDropModal(idx)}}
function saveDrop(){if(!currentCase)return;let n=document.getElementById('dropNameInp').value.trim();let p=parseFloat(document.getElementById('dropPriceInp').value);let i=document.getElementById('dropImgInp').value.trim();let c=parseFloat(document.getElementById('dropChanceInp').value.replace(',','.'));if(!n||isNaN(p)||p<=0||isNaN(c)||c<=0)return toast('Заполните все поля!');let drop={name:n,price:p,img:i,chance:c,currency:selectedDropCurrency};if(editDropIdx!==null)currentCase.drops[editDropIdx]=drop;else currentCase.drops.push(drop);closeModal('dropModal');buildContentsGrid(currentCase);buildRoulette(currentCase.drops);saveData();toast('✅ Дроп сохранён!')}
function delDrop(cid,idx){let cs=cases.find(c=>c.id===cid);if(cs){cs.drops.splice(idx,1);currentCase=cs;buildContentsGrid(cs);buildRoulette(cs.drops);saveData();toast('🗑 Дроп удалён')}}
function closeModal(id){document.getElementById(id).classList.remove('on');editCaseId=null;editDropIdx=null}
function toast(m){let t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2000)}

// ИНИЦИАЛИЗАЦИЯ
document.querySelectorAll('#profileTabs .menu-tab').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('#profileTabs .menu-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));document.getElementById('tab-'+t.dataset.tab).classList.add('active')}));
document.querySelectorAll('.nav-button').forEach(b=>b.addEventListener('click',()=>showPage(b.dataset.page)));

createStars();updBal();renderCases();updInv();updHist();updGiftDeposits();renderLiveTicker();updRef();
if(isAdmin)document.getElementById('adminPanel').style.display='block';
document.getElementById('refLink').textContent='https://t.me/VilldGiftBot?start=ref'+userId;

// Тест-кнопка
let tb=document.createElement('button');
tb.textContent='🧪 Тест: получить подарок';
tb.style.cssText='width:100%;padding:10px;margin-top:10px;background:#1a1a2e;border:1px solid #ffd700;color:#ffd700;border-radius:10px;cursor:pointer;font-size:12px';
tb.onclick=()=>addGiftDeposit('🌟 Премиум',500,'🌟','star');
document.getElementById('tab-gifts').appendChild(tb);

syncFromCloud().then(s=>{if(!s)renderCases()});

setTimeout(()=>{document.getElementById('flashTransition').classList.add('active');setTimeout(()=>{document.getElementById('loadingScreen').classList.add('hide');document.getElementById('mainApp').classList.add('show');setTimeout(()=>document.getElementById('flashTransition').classList.remove('active'),200)},250)},2500);
</script>
